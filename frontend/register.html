<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Lost & Found</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html"> Lost & Found</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Browse Items</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <p class="auth-subtitle">Join the Strathmore Lost & Found community</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password (min 6 characters)" required minlength="6" />
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required />
                </div>
                <div class="form-group">
                    <label for="studentId">Student ID (Optional)</label>
                    <input type="text" id="studentId" placeholder="e.g., 123456" />
                    <small class="form-hint">Only required if you are a student</small>
                </div>
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" required>
                        <option value="student">Student</option>
                        <option value="security">Security Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div id="registerError" class="error-message" style="display:none;"></div>
                <div id="registerSuccess" class="success-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            
            <p class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Strathmore University - Lost & Found Platform</p>
    </footer>
</body>
</html>
